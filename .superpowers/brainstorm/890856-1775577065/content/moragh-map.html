<script>
  const svg = document.getElementById('map');
  let viewBox = { x: 0, y: 0, w: 1600, h: 1100 };
  let isPanning = false, startPoint = { x: 0, y: 0 };

  function updateViewBox() {
    svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  }

  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const scale = e.deltaY > 0 ? 1.1 : 0.9;
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width;
    const my = (e.clientY - rect.top) / rect.height;
    const newW = viewBox.w * scale, newH = viewBox.h * scale;
    viewBox.x += (viewBox.w - newW) * mx;
    viewBox.y += (viewBox.h - newH) * my;
    viewBox.w = newW; viewBox.h = newH;
    updateViewBox();
  });

  svg.addEventListener('mousedown', (e) => { isPanning = true; startPoint = { x: e.clientX, y: e.clientY }; });
  svg.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    const rect = svg.getBoundingClientRect();
    const dx = (e.clientX - startPoint.x) / rect.width * viewBox.w;
    const dy = (e.clientY - startPoint.y) / rect.height * viewBox.h;
    viewBox.x -= dx; viewBox.y -= dy;
    startPoint = { x: e.clientX, y: e.clientY };
    updateViewBox();
  });
  svg.addEventListener('mouseup', () => isPanning = false);
  svg.addEventListener('mouseleave', () => isPanning = false);

  function zoomIn() { viewBox.x += viewBox.w*0.15; viewBox.y += viewBox.h*0.15; viewBox.w *= 0.7; viewBox.h *= 0.7; updateViewBox(); }
  function zoomOut() { viewBox.x -= viewBox.w*0.2; viewBox.y -= viewBox.h*0.2; viewBox.w *= 1.4; viewBox.h *= 1.4; updateViewBox(); }
  function resetView() { viewBox = { x: 0, y: 0, w: 1600, h: 1100 }; updateViewBox(); }
</script>
