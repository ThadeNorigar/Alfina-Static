  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);

}

`;

  const d = 'M ' + cell.map(p => p[0]+','+p[1]).join(' L ') + ' Z';

  // Cell fill
  cellGroup.appendChild(el('path', {
    d, fill: colors.fill, stroke: colors.stroke, 'stroke-width': '0.5', 'stroke-opacity': '0.6'

}

const cityGroup = el('g', {});
cities.forEach(([x, y, name, size, faction]) => {
  if (size < 0) return; // dead
  if (size === 0) {
    // Tiny dot for fill points
    cityGroup.appendChild(el('circle', { cx:x, cy:y, r:1.5, fill:'#5a5550', opacity:'0.4' }));
    return;
  }
  const r = size === 3 ? 5 : size === 2 ? 3.5 : 2.5;
  const fillColor = size === 3 ? '#f0e6d8' : size === 2 ? '#c8bfb0' : '#8a8279';
  const attrs = { cx:x, cy:y, r, fill: fillColor };
  if (size === 3) attrs.filter = 'url(#glow)';
  cityGroup.appendChild(el('circle', attrs));

  if (name) {
    const fontSize = size === 3 ? 9 : size === 2 ? 7.5 : 6.5;
    const textColor = size === 3 ? '#f0e6d8' : size === 2 ? '#b0a898' : '#7a7269';
    const weight = size === 3 ? '600' : '400';
    const t = el('text', { x: x + r + 4, y: y + 3, fill: textColor, 'font-size': fontSize, 'font-weight': weight });
    t.textContent = name;
    cityGroup.appendChild(t);
  }
});
svg.appendChild(cityGroup);

// Portal
const portalG = el('g', { filter: 'url(#glow)' });
portalG.appendChild(el('circle', { cx: portal[0], cy: portal[1], r: 6, fill: '#b8860b', stroke: '#e74c3c', 'stroke-width': '2.5' }));
const pt = el('text', { x: portal[0]+10, y: portal[1]-2, fill: '#e8c170', 'font-size': '9', 'font-weight': '600' });
pt.textContent = portal[2];
portalG.appendChild(pt);
const pt2 = el('text', { x: portal[0]+10, y: portal[1]+10, fill: '#9e958b', 'font-size': '7' });
pt2.textContent = '(Portal nach Thalassien)';
portalG.appendChild(pt2);
svg.appendChild(portalG);

// Compass
svg.innerHTML += `

  <g transform="translate(1350,1050)">

// Pan/Zoom
let vb = { x: 0, y: 0, w: 1600, h: 1100 };
let isPanning = false, sp = { x: 0, y: 0 };

function updateVB() { svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`); }

svg.addEventListener('wheel', e => {
  e.preventDefault();
  const s = e.deltaY > 0 ? 1.1 : 0.9;
  const r = svg.getBoundingClientRect();
  const mx = (e.clientX - r.left) / r.width, my = (e.clientY - r.top) / r.height;
  const nw = vb.w * s, nh = vb.h * s;
  vb.x += (vb.w - nw) * mx; vb.y += (vb.h - nh) * my;
  vb.w = nw; vb.h = nh;
  updateVB();
});

svg.addEventListener('mousedown', e => { isPanning = true; sp = { x: e.clientX, y: e.clientY }; });
svg.addEventListener('mousemove', e => {
  if (!isPanning) return;
  const r = svg.getBoundingClientRect();
  vb.x -= (e.clientX - sp.x) / r.width * vb.w;
  vb.y -= (e.clientY - sp.y) / r.height * vb.h;
  sp = { x: e.clientX, y: e.clientY };
  updateVB();
});
svg.addEventListener('mouseup', () => isPanning = false);
svg.addEventListener('mouseleave', () => isPanning = false);

function zoomIn() { vb.x += vb.w*0.15; vb.y += vb.h*0.15; vb.w *= 0.7; vb.h *= 0.7; updateVB(); }
function zoomOut() { vb.x -= vb.w*0.2; vb.y -= vb.h*0.2; vb.w *= 1.4; vb.h *= 1.4; updateVB(); }
function resetView() { vb = { x: 0, y: 0, w: 1600, h: 1100 }; updateVB(); }
</script>
