    - generic [ref=e382]:
      - generic [ref=e383]:
        - generic [ref=e384]: Vespers Uhren-Ringe über Vael
        - generic [ref=e385]: "Vier Wochen systematische Kartografie. Siebzehn abweichende Uhren zwischen elf Sekunden und zwei Minuten dreiundzwanzig pro Tag. Sortiert nach Magnitude-Gruppen ergeben sie vier konzentrische Ringe um einen Mittelpunkt. Die Tidemoor-Uhr (4:33) ist ein Sonderfall außerhalb des Rings. Tschechow für Akt II/III: der Mittelpunkt ist der Steinkreis im Botanischen Garten."
      - generic [ref=e386]:
        - generic [ref=e387]: "Vesper erkennt: der Takt in der Brust hält"
        - generic [ref=e388]: "Beim ersten Besuch (10. April) lief die Tidemoor-Uhr nur unter Vespers Hand rein und verlor 4:33 wieder, sobald er losließ. Vor einer Woche (7. Mai) ist er zurückgekehrt und hat der Uhr nicht nur die Hand aufgelegt, sondern den sauberen Takt einer Ankerhemmung aus der eigenen Brust durch die Handfläche ins Messing vorgelegt — als Form, dann als innerer Satz: 'So. Genau so. Behalte diesen Schlag.' Seitdem läuft sie ohne Unterbrechung rein. Am Abend des 14. Mai bestätigt sich die Erkenntnis zweifach: er erzählt es im Dialog mit Alphina zum ersten Mal aus, und Kvarns Taschenuhr in seinem Zimmer läuft nach 90 Minuten Welle-Arbeit mit dem Takt in der Brust ebenfalls null Drift. Tschechow: Vesper ist selbst Resonanz-Quelle, und aktiv weitergegebene Takte halten dauerhaft."
      - generic [ref=e389]:
        - generic [ref=e390]: Alphina und Vesper finden sich
        - generic [ref=e391]: "Alphina klopft. Dialog im Türrahmen, Tür bleibt auf einem Spalt. Sie stellt sich vor (Botanikerin aus Velde, Botanischer Garten, Runa als Quelle) und fragt: stimmt die Erzählung über die 4:33-Standuhr? Vesper erzählt zweigeteilt. Erstens: der passive Erstbefund vor fünf Wochen (Hand drauf/weg, reaktiv). Zweitens — und zum ersten Mal vor einem anderen Menschen ausgesprochen: der zweite Besuch vor einer Woche, bei dem er der Uhr aktiv den sauberen Ankerhemmungs-Takt aus der eigenen Brust durch die Handfläche ins Messing vorgelegt hat, mit dem inneren Satz 'So. Genau so. Behalte diesen Schlag.' Seitdem läuft sie rein. Alphina legt die Parallele offen: die großen Farne an der Nordmauer vor neun Tagen, Handfläche am Mittelnerv, zwanzig Atemzüge eine Wachstumsform aus der Brust, Henrik muss nicht mehr schneiden. Dazu der Gegenpol: drei Tage zurück der Stein im Steinkreis, drei Pulsstöße passiv empfangen. Beide benennen gemeinsam zwei Modi: Geben (aktiv, formt das Material für Dauer) und Hören (passiv). Erst danach zeigt Vesper die Ring-Karte. Alphina identifiziert den Mittelpunkt sofort als den Steinkreis im Botanischen Garten. Kein Körperkontakt außer einem beiläufigen Daumen-Streifen beim Rückgeben des Notizbuchs. Verabredung für morgen halb zehn am grünen Tor."
      - generic [ref=e392]:
        - generic [ref=e393]: Kvarns Uhr läuft rein — Vesper erkennt sich selbst als Punkt
        - generic [ref=e394]: "Nach Alphinas Abgang läuft Kvarns Taschenuhr rein, ohne dass Vesper die Welle weiter gedreht hat. Hand auf Gehäuse: dieselbe Wärme wie im Tidemoor-Gehäuse. Er erkennt: er hat Kvarn nichts explizit vorgelegt, aber er hat die anderthalb Stunden an der Welle gearbeitet mit dem sauberen Ankerhemmungs-Takt in der Brust, und das hat gereicht. Der Takt wandert aus dem Resonator ins Material, sobald Kontakt und innerer Takt zusammenfallen — bei Tidemoor als ausgesprochener Befehl, bei Kvarn als stille Anwesenheit während der Arbeit. Er schreibt zwei Zeilen ins Notizbuch: 'Ich bin der achtzehnte Punkt. Zwei Türen weiter, die neunzehnte.' Er erkennt sich und Alphina als Teile des Phänomens, nicht nur als Beobachter. Der Mittelpunkt bleibt der Steinkreis — aber die Vier werden selbst Quellen sein."
      - generic [ref=e395]:
        - generic [ref=e396]: "Stadt-Anomalien eskalieren: Vespers Netz verdichtet sich"
        - generic [ref=e397]: "In den Tagen vor Kap 11: Risse im Pflaster, heißes Wasser in weiteren Häusern, Kaminfeuer ohne Brennstoff. Vespers Ring-Kartografie fängt das Wachstum des Musters in Echtzeit auf."
        - generic [ref=e399]: "Erkenntnis: Vael zerfaellt"
