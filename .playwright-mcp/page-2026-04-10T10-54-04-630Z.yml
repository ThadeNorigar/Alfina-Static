      - generic [ref=e91]:
        - generic [ref=e92]: Varens Leylinien-Experiment scheitert
        - generic [ref=e93]: "Varen (Velmar-Forscher) versucht drei benachbarte Quellen unter Mar-Keth zu koppeln um magiefreie Flaechen besiedelbar zu machen (Motiv: Expansion der bewohnbaren Zonen, nicht akute Ueberbevoelkerung). Unfall. 3 Reservoir-Quellen kollabieren unwiederbringlich: Mar-Keth (riesig, ~120.000 Einwohner, Varens Herkunftsstadt), Dulrath-Ost (groß), Reshkol (groß). Städte verdorren, ~200.000 Menschen heimatlos. Velmar weiss und vertuscht (Ausstoß Varens ohne offizielle Anklage). Bund und Thar wissen nichts, halten es für Naturkatastrophe."
        - generic [ref=e94]:
          - generic [ref=e95]: Schlüsselereignis
          - generic [ref=e96]: "Tschechow: Varens Schuld"
      - generic [ref=e97]:
        - generic [ref=e98]: Der Krieg beginnt — Orath vs. Thar vs. Velmar
        - generic [ref=e99]: "Ausloeser: Das Thar-Konglomerat glaubt, der Bund von Orath habe die Explosion absichtlich ausgeloest und sie angegriffen. Es gibt genug Quellen -- der Krieg beginnt nicht aus Ressourcenknappheit, sondern aus Misstrauen und Vergeltung. Dauert 4 MZ-Jahre (= ~1.600 TZ). Drei Fraktionen, drei Philosophien, keine Sieger. Die Vier erfahren in Buch 2 zunaechst die Konglomerat-Version."
        - generic [ref=e101]: Schlüsselereignis
      - generic [ref=e102]: ~1 MZ — Krieg tobt im ersten Jahr. Varen, von Velmar verdeckt ausgestossen, zieht sich in die Grenzlande zurueck, sammelt erste Deserteure um sich.
      - generic [ref=e103]:
        - generic [ref=e104]: Varen beginnt die Portalforschung
        - generic [ref=e105]: Ein Jahr nach Kriegsbeginn. Varen erkennt dass die drei toten Quellen mit Moragh-Magie allein nicht wiederzubeleben sind (geschlossenes System — man kann einen trockenen Brunnen nicht mit Wasser aus dem Nachbarbrunnen fuellen). Er erinnert sich an die 350 Verschwundenen vor 200 MZ-Jahren, die durch ein Quellenportal gingen und nie zurueckkehrten. Portalmagie wurde danach von allen Fraktionen verboten. Varen beginnt im Geheimen mit der Rekonstruktion — Druckmanipulation kennt er bereits, Zeitmanipulation (= Schwerkraft, die gleiche physikalische Groesse) muss er lernen. Erste Risse im Gefuege, brachiale Versuche.
        - generic [ref=e106]:
          - generic [ref=e107]: Schlüsselereignis
          - generic [ref=e108]: "Tschechow: Varens Portalforschung"
      - generic [ref=e109]: ~2 MZ — Krieg tobt weiter. Varen forscht am Portal, im Geheimen. Fuer Elke-Zeit (TZ 154 = MZ -1) sind es seine ersten erfolgreichen Risse im Gefuege.
      - generic [ref=e110]:
