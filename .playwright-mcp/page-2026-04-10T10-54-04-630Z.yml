        - generic [ref=e129]: "Elke hat ihn verlassen. Varen glaubt: Resonanz-Magie ohne Quelle ist die Loesung. Er kann nicht selbst durchs Portal ohne sich die Rueckkehr zu verbauen. Schickt menschliche Agenten (Moragh-geboren) mit klarem Auftrag + gebundene Schemen als Helfer (Agenten koennen kein Handwerk). Schemen erledigen praktische Arbeit. Ueber Schemen-Bindung sammelt Varen diffuse Informationen."
