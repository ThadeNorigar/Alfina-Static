    <path d="M50 190 Q55 140 48 70 Q45 30 50 0"/>
    <path d="M49 165 Q28 150 15 158"/>
    <path d="M48 145 Q30 128 18 134"/>
    <path d="M48 125 Q33 108 24 113"/>
    <path d="M48 105 Q36 88 30 92"/>
    <path d="M49 85 Q40 70 35 74"/>
    <path d="M50 160 Q68 148 78 155"/>
    <path d="M50 140 Q66 126 75 132"/>
    <path d="M49 120 Q64 106 72 111"/>
    <path d="M49 100 Q62 88 68 92"/>
