    <path d="M52 170 Q30 155 15 165"/>
    <path d="M53 150 Q32 132 18 140"/>
    <path d="M54 130 Q35 110 22 116"/>
    <path d="M55 110 Q38 90 28 95"/>
    <path d="M55 90 Q42 72 35 76"/>
    <path d="M54 70 Q46 55 40 58"/>
    <path d="M53 160 Q70 148 82 158"/>
    <path d="M54 140 Q72 125 83 132"/>
    <path d="M55 120 Q72 105 80 110"/>
    <path d="M55 100 Q70 86 76 90"/>
    <path d="M55 80 Q66 68 72 72"/>
