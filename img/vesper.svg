<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" fill="none">
  <!-- Background -->
  <rect width="400" height="520" fill="#f2f0ed"/>

  <!-- Workbench surface -->
  <rect x="0" y="380" width="400" height="140" fill="#e5e0d8" opacity="0.5"/>
  <line x1="0" y1="380" x2="400" y2="380" stroke="#c4b8a8" stroke-width="0.5"/>

  <!-- Silhouette - hunched over workbench -->
  <path d="M160 210 Q165 180 185 165 Q200 158 215 165 Q235 180 240 210 L245 260 Q248 300 245 340 L250 380 Q200 390 150 380 L155 340 Q152 300 155 260 Z" fill="#2c2420"/>
  <!-- Head - slightly tilted down (working) -->
  <ellipse cx="200" cy="152" rx="26" ry="28" fill="#2c2420"/>
  <!-- Short hair -->
  <path d="M174 148 Q172 135 178 125 Q190 118 200 116 Q210 118 222 125 Q228 135 226 148" stroke="#2c2420" stroke-width="6" fill="#2c2420"/>

  <!-- Arms reaching to workbench -->
  <path d="M160 220 Q140 260 130 310 Q125 340 135 370" stroke="#2c2420" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M240 220 Q260 260 270 310 Q275 340 265 370" stroke="#2c2420" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Hands -->
  <ellipse cx="135" cy="375" rx="10" ry="6" fill="#2c2420"/>
  <ellipse cx="265" cy="375" rx="10" ry="6" fill="#2c2420"/>

  <!-- Watch on workbench -->
  <g transform="translate(185, 385)">
    <circle cx="15" cy="15" r="18" fill="none" stroke="#8a7e72" stroke-width="1"/>
    <circle cx="15" cy="15" r="15" fill="none" stroke="#8a7e72" stroke-width="0.5"/>
    <!-- Watch face markers -->
    <line x1="15" y1="2" x2="15" y2="5" stroke="#8a7e72" stroke-width="0.8"/>
    <line x1="15" y1="25" x2="15" y2="28" stroke="#8a7e72" stroke-width="0.8"/>
    <line x1="2" y1="15" x2="5" y2="15" stroke="#8a7e72" stroke-width="0.8"/>
    <line x1="25" y1="15" x2="28" y2="15" stroke="#8a7e72" stroke-width="0.8"/>
    <!-- Hands -->
    <line x1="15" y1="15" x2="15" y2="6" stroke="#8a7e72" stroke-width="0.8"/>
    <line x1="15" y1="15" x2="22" y2="12" stroke="#8a7e72" stroke-width="0.5"/>
    <circle cx="15" cy="15" r="1.5" fill="#8a7e72"/>
  </g>

  <!-- Gears scattered on bench -->
  <g transform="translate(80, 395)" stroke="#a09488" stroke-width="0.6" fill="none" opacity="0.7">
    <circle cx="10" cy="10" r="8"/>
    <circle cx="10" cy="10" r="5"/>
    <circle cx="10" cy="10" r="1.5" fill="#a09488"/>
    <line x1="10" y1="2" x2="10" y2="0" stroke-width="1.5"/>
    <line x1="16" y1="6" x2="18" y2="5" stroke-width="1.5"/>
    <line x1="16" y1="14" x2="18" y2="15" stroke-width="1.5"/>
    <line x1="10" y1="18" x2="10" y2="20" stroke-width="1.5"/>
    <line x1="4" y1="14" x2="2" y2="15" stroke-width="1.5"/>
    <line x1="4" y1="6" x2="2" y2="5" stroke-width="1.5"/>
  </g>

  <g transform="translate(290, 400)" stroke="#a09488" stroke-width="0.5" fill="none" opacity="0.5">
    <circle cx="7" cy="7" r="6"/>
    <circle cx="7" cy="7" r="3.5"/>
    <circle cx="7" cy="7" r="1" fill="#a09488"/>
    <line x1="7" y1="1" x2="7" y2="-0.5" stroke-width="1.2"/>
    <line x1="12" y1="4" x2="13.5" y2="3" stroke-width="1.2"/>
    <line x1="12" y1="10" x2="13.5" y2="11" stroke-width="1.2"/>
    <line x1="7" y1="13" x2="7" y2="14.5" stroke-width="1.2"/>
    <line x1="2" y1="10" x2="0.5" y2="11" stroke-width="1.2"/>
    <line x1="2" y1="4" x2="0.5" y2="3" stroke-width="1.2"/>
  </g>

  <!-- Loupe/magnifying lens -->
  <g transform="translate(115, 365)">
    <circle cx="12" cy="12" r="10" fill="none" stroke="#8a7e72" stroke-width="1"/>
    <line x1="19" y1="19" x2="30" y2="30" stroke="#8a7e72" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Chess piece - lone king, off to the side on a shelf -->
  <g transform="translate(40, 80)" stroke="#5a524a" stroke-width="1" fill="none" opacity="0.6">
    <!-- Shelf -->
    <line x1="-10" y1="65" x2="50" y2="65" stroke-width="0.5"/>
    <!-- King -->
    <path d="M20 62 L15 62 Q10 55 12 45 L10 40 Q15 35 20 30 Q25 35 30 40 L28 45 Q30 55 25 62 Z"/>
    <line x1="20" y1="20" x2="20" y2="30"/>
    <line x1="15" y1="25" x2="25" y2="25"/>
    <circle cx="20" cy="18" r="3"/>
  </g>

  <!-- Desk lamp light cone -->
  <g opacity="0.08">
    <path d="M300 100 L180 370 L280 390 Z" fill="#b8860b"/>
  </g>

  <!-- Desk lamp -->
  <g stroke="#5a524a" stroke-width="1.5" fill="none">
    <line x1="310" y1="380" x2="310" y2="200"/>
    <line x1="310" y1="200" x2="300" y2="110"/>
    <path d="M280 110 Q300 100 320 110 L310 140 L290 140 Z" fill="#5a524a" opacity="0.3" stroke="none"/>
    <path d="M280 110 Q300 100 320 110"/>
    <ellipse cx="310" cy="385" rx="20" ry="5" fill="#5a524a" opacity="0.2" stroke="none"/>
  </g>

  <!-- Tweezers in hand area -->
  <g transform="translate(255, 360)" stroke="#8a7e72" stroke-width="0.8" fill="none">
    <path d="M0 0 Q5 15 3 30"/>
    <path d="M4 0 Q8 15 6 30"/>
  </g>

  <!-- Subtle scratches on bench surface -->
  <line x1="50" y1="420" x2="90" y2="418" stroke="#c4b8a8" stroke-width="0.3" opacity="0.4"/>
  <line x1="300" y1="430" x2="350" y2="432" stroke="#c4b8a8" stroke-width="0.3" opacity="0.4"/>
  <line x1="150" y1="450" x2="200" y2="448" stroke="#c4b8a8" stroke-width="0.3" opacity="0.3"/>
</svg>
