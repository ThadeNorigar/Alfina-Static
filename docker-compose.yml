services:
  web:
    image: nginx:alpine
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alfina.rule=Host(`alphina.net`) || Host(`www.alphina.net`)"
      - "traefik.http.routers.alfina.entrypoints=websecure"
      - "traefik.http.routers.alfina.tls.certresolver=letsencrypt"
      - "traefik.http.services.alfina.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
